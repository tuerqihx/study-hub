<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桃桃的语文阅读 📖</title>
<style>
  * { box-sizing:border-box; }
  .noselect { -webkit-user-select:none; user-select:none; }
  html,body { margin:0; padding:0; }
  body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:linear-gradient(160deg,#f3eeff 0%,#eef3ff 100%); color:#3a3450; min-height:100vh; padding:18px 16px 50px; }
  .wrap { max-width:760px; margin:0 auto; }
  .bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .back { background:#fff; border:2px solid #c9b8ff; color:#7c5cff; font-weight:bold; font-size:16px;
    padding:8px 16px; border-radius:14px; cursor:pointer; font-family:inherit; }
  .star-now { font-size:18px; font-weight:bold; color:#7c5cff; }
  h1 { text-align:center; font-size:30px; margin:4px 0 16px; }
  .menu { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:14px; }
  .lv { border:none; color:#fff; border-radius:22px; padding:22px 14px; cursor:pointer; font-family:inherit;
    text-align:center; box-shadow:0 6px 16px rgba(0,0,0,.12); transition:transform .12s; }
  .lv:hover{transform:translateY(-4px) scale(1.02);} .lv:active{transform:scale(.97);}
  .lv .i{font-size:44px;display:block;} .lv .n{font-size:20px;font-weight:bold;margin-top:6px;} .lv .d{font-size:13px;opacity:.92;margin-top:3px;}
  .l1{background:linear-gradient(140deg,#9b8cff,#7c5cff);} .l2{background:linear-gradient(140deg,#5ac8fa,#3b82f6);}
  .l3{background:linear-gradient(140deg,#56d6a0,#1fae8c);} .l4{background:linear-gradient(140deg,#ff9a56,#ff6b6b);}
  .card { display:none; }
  .passage { background:#fff; border-radius:20px; padding:18px 20px; box-shadow:0 4px 16px rgba(124,92,255,.14);
    border:3px solid #e0d7ff; font-size:19px; line-height:2; margin-bottom:14px; }
  .passage .ptitle { font-size:20px; font-weight:bold; text-align:center; color:#7c5cff; margin-bottom:8px; }
  .ppic { display:block; max-width:100%; max-height:440px; margin:0 auto 14px; border-radius:14px; box-shadow:0 4px 16px rgba(124,92,255,.2); border:3px solid #e8dcc8; }
  .qbox { background:#fff; border-radius:20px; padding:20px; box-shadow:0 4px 16px rgba(124,92,255,.14); border:3px solid #e0d7ff; }
  .progress { font-size:14px; color:#aaa; text-align:center; margin-bottom:6px; }
  .qtag { display:inline-block; background:#efeaff; color:#7c5cff; font-size:13px; font-weight:bold; padding:2px 10px; border-radius:10px; margin-bottom:8px;}
  .q { font-size:21px; line-height:1.5; margin:4px 0 16px; } .q b{color:#7c5cff;}
  .opts { display:grid; gap:12px; }
  .opt { background:#f6f3ff; border:2px solid #ddd2ff; border-radius:16px; padding:14px 16px; font-size:19px; font-weight:bold;
    cursor:pointer; font-family:inherit; color:#3a3450; transition:.1s; text-align:left; }
  .opt:hover{background:#ece5ff;} .opt:active{transform:scale(.99);}
  .opt.right{background:#d7f7e3;border-color:#56d6a0;} .opt.wrong{background:#ffe1e1;border-color:#ff8585;}
  .feedback{text-align:center;font-size:21px;font-weight:bold;min-height:32px;margin:14px 0 6px;} .feedback.ok{color:#1fae8c;} .feedback.no{color:#ff8c42;}
  .next{display:none;background:#7c5cff;color:#fff;border:none;border-radius:16px;font-size:20px;font-weight:bold;padding:14px 30px;cursor:pointer;font-family:inherit;margin:6px auto 0;}
  .done{display:none;text-align:center;background:#fff;border-radius:24px;padding:30px 20px;box-shadow:0 6px 20px rgba(124,92,255,.2);border:3px solid #e0d7ff;}
  .done .big{font-size:64px;} .done .msg{font-size:24px;font-weight:bold;margin:10px 0;} .done .got{font-size:19px;color:#7c5cff;margin-bottom:18px;}
  .done button{background:#7c5cff;color:#fff;border:none;border-radius:16px;font-size:19px;font-weight:bold;padding:13px 26px;cursor:pointer;font-family:inherit;margin:6px;}
  .done .ghost{background:#fff;color:#7c5cff;border:2px solid #c9b8ff;}

  /* ---- iPad / 手机适配：屏幕≤900px 时整体紧凑、图标缩小 ---- */
  @media (max-width: 900px){
    body{ padding:12px 8px 40px; }
    h1{ font-size:22px; margin:2px 0 10px; }
    .menu{ grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:9px; }
    .lv{ padding:12px 6px; border-radius:15px; }
    .lv .i{ font-size:26px; }
    .lv .n{ font-size:14px; }
    .lv .d{ font-size:11px; }
    .q{ font-size:19px; min-height:44px; }
    .opt{ font-size:16px; padding:11px; border-radius:12px; }
    .key{ font-size:19px; padding:11px; }
    .done .big{ font-size:44px; }
    .done .got{ font-size:15px; }
    #continueBtn{ font-size:16px !important; padding:11px 20px !important; }
  }
</style>
</head>
<body>
<div class="wrap noselect">
  <div class="bar">
    <button class="back" onclick="goHome()">🏡 回学习台</button>
    <span class="star-now" id="starNow">今天 ⭐ 0</span>
  </div>
  <h1>📖 桃桃的语文阅读</h1>
  <div class="menu" id="menu"></div>

  <div class="card" id="card">
    <div class="passage"><div class="ptitle" id="ptitle"></div><img id="ppic" class="ppic" style="display:none"><div id="ptext"></div></div>
    <div class="qbox">
      <div class="progress" id="prog"></div>
      <span class="qtag" id="qtag"></span>
      <div class="q" id="q"></div>
      <div class="opts" id="answerArea"></div>
      <div class="feedback" id="fb"></div>
      <button class="next" id="nextBtn" onclick="nextQ()">下一题 →</button>
    </div>
  </div>

  <div class="done" id="done">
    <div class="big">🎉</div>
    <div class="msg" id="doneMsg"></div>
    <div class="got" id="doneGot"></div>
    <button onclick="location.reload()">再读一篇</button>
    <button class="ghost" onclick="goHome()">回学习台</button>
  </div>
</div>
<script>
const STORE_KEY="taotao_chinese_v1";
function loadStore(){ try{return JSON.parse(localStorage.getItem(STORE_KEY))||{days:{},review:[]};}catch(e){return {days:{},review:[]};} }
function saveStore(){ try{localStorage.setItem(STORE_KEY,JSON.stringify(STORE));}catch(e){} }
let STORE=loadStore(); if(!STORE.review)STORE.review=[]; if(!STORE.done)STORE.done={}; if(!STORE.last)STORE.last={};
function dkey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayRec(){const k=dkey(new Date());if(!STORE.days[k])STORE.days[k]={stars:0,correct:0,guessed:0};return STORE.days[k];}
function showStarNow(){document.getElementById("starNow").textContent="今天 ⭐ "+todayRec().stars;}
showStarNow();

/* 每天时间额度（制造稀缺感，非无限刷）：用完当天锁住，明天重新满格 */
const TIME_LIMIT_MIN=12;
function timeRec(){ const r=todayRec(); if(!r.timeSec) r.timeSec=0; return r; }
function usedSec(){ return timeRec().timeSec; }
function remainSec(){ return Math.max(0, TIME_LIMIT_MIN*60 - usedSec()); }
let sessionStart=null;
function tickTime(){ if(!sessionStart) return; const now=Date.now(); const r=timeRec(); r.timeSec=(r.timeSec||0)+(now-sessionStart)/1000; sessionStart=now; saveStore(); }
function renderTimeBanner(){ let b=document.getElementById("timeBanner");
  if(!b){ const menu=document.getElementById("menu"); b=document.createElement("div"); b.id="timeBanner";
    b.style.cssText="text-align:center;font-size:15px;font-weight:bold;color:#999;margin:0 0 10px;"; menu.parentNode.insertBefore(b, menu); }
  const r=Math.ceil(remainSec()/60);
  b.textContent = r>0 ? ("⏳ 今天语文还能玩 "+r+" 分钟") : "⏰ 今天语文的时间用完啦，明天再来玩～"; }

function goHome(){ tickTime(); location.href="../index.html"; }
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function choose(a){ return a[Math.floor(Math.random()*a.length)]; }
function sampleN(a,n){ return shuffle(a).slice(0,n); }
/* 字词句生成题：每关现出 5 道不重复的新题（buildGenRound 在 start() 里被调用） */
function buildGenRound(mod){ const out=[], seen=new Set(); let guard=0;
  while(out.length<5 && guard<120){ const it=mod.gen(); const k=(it.q||"")+"|"+it.answer; if(!seen.has(k)){ seen.add(k); out.push(it); } guard++; }
  return out; }
/* 阅读题按日轮换：每次读一篇只出 3 道——答错过的题必出（错题不换），
   其余按日期轮着换，今天和明天读同一篇，出的题不一样，不会总碰到见过的题 */
function pickDaily(p){
  const all=p.__all||p.questions||[], PER_READ=3;
  if(all.length<=PER_READ) return all.slice();
  const strip=s=>String(s||"").replace(/<[^>]+>/g," ").trim();
  const missed=new Set((STORE.review||[]).map(r=>strip(r.q)));
  const out=[], rest=[];
  all.forEach(it=>{ (missed.has(strip(it.q)) && out.length<PER_READ ? out : rest).push(it); });
  const t=new Date(), dayNum=t.getFullYear()*372+t.getMonth()*31+t.getDate();
  const need=Math.min(PER_READ, all.length)-out.length;
  const off=rest.length?dayNum%rest.length:0;
  for(let k=0;k<need && rest.length;k++) out.push(rest[(off+k)%rest.length]);
  return out;
}
let AC=null; function actx(){try{if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)();if(AC.state==="suspended")AC.resume();return AC;}catch(e){return null;}}
function tone(f,d,t,w,g){const c=actx();if(!c)return;const s=c.currentTime+(w||0);const o=c.createOscillator(),ga=c.createGain();o.type=t||"sine";o.frequency.value=f;ga.gain.setValueAtTime(g||0.12,s);ga.gain.exponentialRampToValueAtTime(0.0001,s+d);o.connect(ga);ga.connect(c.destination);o.start(s);o.stop(s+d);}
function sndRight(){tone(660,.12,"triangle",0);tone(990,.16,"triangle",.1);}
function sndWrong(){tone(170,.2,"sawtooth",0,.07);}
function sndCombo(){tone(780,.1,"triangle",0);tone(1040,.1,"triangle",.08);tone(1320,.14,"triangle",.16);}
function sndFinish(){[523,659,784,1047].forEach((f,i)=>tone(f,.18,"triangle",i*.12));}
function burst(em){const arr=em||["⭐","🌟","🎉","✨"];for(let i=0;i<14;i++){const s=document.createElement("span");s.textContent=arr[i%arr.length];s.style.cssText="position:fixed;left:"+rnd(8,92)+"%;top:"+rnd(12,42)+"%;font-size:"+rnd(20,38)+"px;pointer-events:none;z-index:9999;transition:all 1.1s ease-out;opacity:1;";document.body.appendChild(s);requestAnimationFrame(()=>{s.style.top=rnd(72,100)+"%";s.style.opacity="0";});setTimeout(()=>s.remove(),1200);}}
function floatPlus(){const st=document.getElementById("starNow");const p=document.createElement("span");p.textContent="+1⭐";p.style.cssText="position:fixed;font-size:22px;font-weight:bold;color:#7c5cff;pointer-events:none;z-index:9999;transition:all .9s ease-out;";const r=st?st.getBoundingClientRect():{left:innerWidth/2,top:60};p.style.left=r.left+"px";p.style.top=r.top+"px";document.body.appendChild(p);requestAnimationFrame(()=>{p.style.top=(r.top-42)+"px";p.style.opacity="0";});setTimeout(()=>p.remove(),950);}
let barWrap=null;
function ensureBar(){if(barWrap)return;const prog=document.getElementById("prog");if(!prog)return;barWrap=document.createElement("div");barWrap.style.cssText="height:12px;background:#eef0f3;border-radius:8px;overflow:hidden;margin:6px 0 10px;";barWrap.innerHTML='<div id="bar" style="height:100%;width:0;border-radius:8px;background:linear-gradient(90deg,#9b8cff,#7c5cff);transition:width .3s;"></div>';prog.parentNode.insertBefore(barWrap,prog.nextSibling);}
function setBar(d,t){ensureBar();const b=document.getElementById("bar");if(b)b.style.width=Math.round(d/t*100)+"%";}

/* 每篇短文 = 一关。题型标签：找信息 / 概括 / 推断 / 联系生活 —— 对应阅读理解四动作。 */
const PASSAGES = [
  /* ===== 字词句 · 无限练（每次进来题目都不一样，刷不完；放在最前面当每天热身） ===== */
  { name:"近义·反义词", icon:"🔤", cls:"l5", sub:"字词句 · 无限练", title:"近义·反义词",
    text:"下面每题给一个词，选出它的<b>近义词</b>（意思相近）或<b>反义词</b>（意思相反）。<br>这一关的题目每次进来都不一样，想练几遍都行～",
    gen(){
      const ANT=[["大","小"],["高","矮"],["快","慢"],["多","少"],["长","短"],["黑","白"],["冷","热"],["前","后"],["上","下"],["开","关"],["新","旧"],["早","晚"],["轻","重"],["明","暗"],["哭","笑"],["真","假"],["甜","苦"],["宽","窄"],["深","浅"],["胖","瘦"]];
      const SYN=[["高兴","快乐"],["美丽","漂亮"],["立刻","马上"],["著名","有名"],["忽然","突然"],["明白","清楚"],["喜欢","喜爱"],["保护","爱护"],["认真","仔细"],["寒冷","严寒"],["安静","宁静"],["勇敢","英勇"],["奇怪","古怪"],["帮助","帮忙"],["漂亮","好看"]];
      const antWords=[]; ANT.forEach(p=>{antWords.push(p[0],p[1]);});
      const isAnt=Math.random()<0.5;
      if(isAnt){
        const p=choose(ANT), swap=Math.random()<0.5, q0=swap?p[1]:p[0], ans=swap?p[0]:p[1];
        const distract=sampleN(antWords.filter(w=>w!==q0&&w!==ans),2);   // 别的反义对里的字，都不是 q0 的反义词，安全
        return { tag:"反义词", q:"“<b>"+q0+"</b>”的反义词是哪个？", options:[ans].concat(distract), answer:ans,
          hint:"和“"+q0+"”意思相反的是“"+ans+"”。" };
      } else {
        const p=choose(SYN), swap=Math.random()<0.5, q0=swap?p[1]:p[0], ans=swap?p[0]:p[1];
        const distract=sampleN(antWords,2);   // 用单字反义词当干扰，肯定不是近义词，安全
        return { tag:"近义词", q:"“<b>"+q0+"</b>”的近义词是哪个？", options:[ans].concat(distract), answer:ans,
          hint:"和“"+q0+"”意思相近的是“"+ans+"”。" };
      }
    }},
  { name:"量词填空", icon:"🔢", cls:"l6", sub:"字词句 · 无限练", title:"量词填空",
    text:"每题在（　）里填一个合适的<b>量词</b>，比如“一（匹）马”“一（本）书”。<br>题目每次都不一样，想练几遍都行～",
    gen(){
      const M=[["马","匹"],["牛","头"],["鱼","条"],["鸟","只"],["书","本"],["花","朵"],["树","棵"],["笔","支"],["纸","张"],["伞","把"],["门","扇"],["灯","盏"],["衣服","件"],["裤子","条"],["山","座"],["狗","只"],["镜子","面"],["路","条"],["刀","把"],["房子","间"]];
      const allM=["匹","头","条","只","本","朵","棵","支","张","把","扇","盏","件","座","面","间"];
      const it=choose(M), noun=it[0], correct=it[1];
      const distract=sampleN(allM.filter(x=>x!==correct),2);
      return { tag:"量词", q:"一（　）"+noun+"　——（　）里应该填哪个量词？", options:[correct].concat(distract), answer:correct,
        hint:"我们平时说“一"+correct+noun+"”。" };
    }},
  { name:"比喻还是拟人", icon:"✨", cls:"l3", sub:"字词句 · 无限练", title:"比喻还是拟人",
    text:"读一读句子，判断它用了<b>比喻</b>（把甲比作乙）还是<b>拟人</b>（把东西当人写）。<br>题目每次都不一样，想练几遍都行～",
    gen(){
      const BI=["弯弯的月亮像一只小船。","荷叶像一把把绿色的小伞。","天上的白云像一群棉花糖。","小河像一条闪光的带子。","雪花像鹅毛一样飘下来。","红红的太阳像个大火球。","柳条像小姑娘的辫子。","圆圆的荷叶像一个个碧绿的大圆盘。"];
      const NI=["小鸟在枝头快乐地唱歌。","花儿向我们点头微笑。","风儿轻轻抚摸着我的脸。","太阳公公起床了。","小溪一路唱着歌向前跑。","大树伸展着胳膊挡住烈日。","春天迈着轻轻的脚步走来了。","小草偷偷地从地里探出头来。"];
      const isBi=Math.random()<0.5, s=choose(isBi?BI:NI);
      return { tag:"修辞", q:"这句话用了什么修辞手法？<br>「"+s+"」", options:["比喻","拟人"], answer:isBi?"比喻":"拟人",
        hint: isBi?"把一样东西比作另一样东西（用了“像”），是比喻。":"把东西当成人来写（会唱歌、会微笑…），是拟人。" };
    }},

  { name:"荷花池", icon:"🪷", cls:"l1", title:"荷花池",
    text:"夏天的清早，公园的池塘里开满了荷花。白的、粉的，一朵挨着一朵。绿绿的荷叶像一把把小伞，遮住了水面。几条小鱼在荷叶下游来游去，好像在和荷花捉迷藏。一阵风吹过，荷花轻轻点头，香味飘得满园都是。",
    questions:[
      {tag:"找信息", q:"池塘里的荷花有哪些颜色？", options:["白的和粉的","红的和黄的","蓝的和紫的"], answer:"白的和粉的", hint:"在第二句里找'白的、粉的'。"},
      {tag:"找信息", q:"文中把荷叶比作了什么？", options:["小伞","小船","小鱼"], answer:"小伞", hint:"'荷叶像一把把小伞'。"},
      {tag:"概括", q:"这段话主要写的是什么？", options:["夏天荷花池的美景","怎样种荷花","小鱼的故事"], answer:"夏天荷花池的美景", hint:"整段都在描写荷花池有多美。"},
          {tag:"找信息", q:"小鱼在荷叶下游来游去，像在和荷花玩什么游戏？", options:["捉迷藏","跳绳","赛跑"], answer:"捉迷藏", hint:"'好像在和荷花捉迷藏'。"},
      {tag:"推断", q:"“荷花轻轻点头”其实是在写什么？", options:["荷花随风轻轻摆动","荷花真的长了头","荷花困了"], answer:"荷花随风轻轻摆动", hint:"把荷花当作人来写，风一吹就像点头。"},
    ]},
  { name:"小蚂蚁", icon:"🐜", cls:"l2", title:"小蚂蚁搬粮食",
    text:"一只小蚂蚁找到一粒大米，可它怎么也搬不动。它没有放弃，跑回家叫来了许多伙伴。大家一起用力，米粒一点点被抬回了洞里。冬天来了，别的小虫又冷又饿，小蚂蚁们却在暖和的洞里吃得饱饱的。",
    questions:[
      {tag:"找信息", q:"小蚂蚁搬不动大米时，它怎么做的？", options:["叫来伙伴一起搬","把米丢掉了","自己哭了"], answer:"叫来伙伴一起搬", hint:"'跑回家叫来了许多伙伴'。"},
      {tag:"推断", q:"为什么冬天蚂蚁们能吃得饱饱的？", options:["因为它们提前搬好了粮食","因为有人送饭","因为冬天不饿"], answer:"因为它们提前搬好了粮食", hint:"它们在之前就把米搬回了洞里。"},

    title:"图书馆里", text:"星期天，我去图书馆看书。这里静悄悄的，大家都低着头认真地读。我刚想和同学大声说话，就看见墙上贴着“请保持安静”。我赶紧闭上嘴，把要说的话写在纸条上递给他。看完书，我把椅子轻轻推回原位，还把翻乱的书摆整齐，才悄悄地离开。",

  { name:"小小值日生", icon:"🧹", cls:"l1", sub:"读短文 · 答题",
    title:"小小值日生", text:"今天轮到我做值日。放学后，同学们都回家了，我留下来打扫教室。我先把地扫干净，又用抹布把黑板擦得亮亮的，还把歪掉的桌椅一张张摆整齐。做完这些，天都快黑了，我有点累，可看着干干净净的教室，心里美滋滋的。第二天，老师在全班表扬了我。",

  { name:"路口的红绿灯", icon:"🚦", cls:"l2", sub:"科普小品 · 答题",

  { name:"我的存钱罐", icon:"🐷", cls:"l3", sub:"读短文 · 答题",
    title:"我的存钱罐", text:"我有一个胖胖的小猪存钱罐。每周妈妈给我的零花钱，我都会留下一点，投进它的肚子里，听“叮”的一声，心里就很开心。有一次我特别想买一个小玩具，可存钱罐里的钱还不够，我忍住了没买。又攒了几个星期，终于凑够了钱，我用自己攒的钱买下了它，那种高兴，是平时得不到的。",

  { name:"不怕黑的晚上", icon:"🌙", cls:"l2", sub:"读短文 · 答题",

let cur=null, qi=0, answered=false, firstWrong=false, combo=0, roundStars=0, roundGuessed=0, bestCombo=0;
const NUM=["①","②","③","④","⑤","⑥","⑦","⑧","⑨","⑩","⑪","⑫","⑬","⑭","⑮","⑯","⑰","⑱","⑲","⑳"];
function ensureContinueBar(){ let bar=document.getElementById("continueBar");
  if(!bar){ bar=document.createElement("div"); bar.id="continueBar"; bar.style.cssText="text-align:center;margin:0 0 16px;";
    const menu=document.getElementById("menu"); menu.parentNode.insertBefore(bar, menu); }
  return bar; }
function renderContinueBar(curIdx, timeUp, picks){ const bar=ensureContinueBar();
  if(timeUp){ bar.innerHTML=""; return; }
  let idx=-1, label="▶️ 接着读：";
  if(curIdx>=0){ idx=curIdx; }
  else if(picks && picks.length){
    const todo=picks.filter(i=>!playedToday(PASSAGES[i].title));
    if(todo.length){ idx=todo[0]; label="📅 今天复习："; }
  }
  if(idx<0){
    bar.innerHTML = (picks&&picks.length)
      ? '<div style="font-size:17px;font-weight:bold;color:#2a9d5c;padding:6px;">🎉 今天语文的任务全做完啦！想多读，从下面随便挑～</div>' : "";
    return;
  }
  const p=PASSAGES[idx];
  bar.innerHTML='<button id="continueBtn" style="background:linear-gradient(140deg,#7c5cff,#9b8cff);color:#fff;border:none;'+
    'border-radius:18px;font-size:19px;font-weight:bold;padding:15px 28px;cursor:pointer;font-family:inherit;'+
    'box-shadow:0 6px 16px rgba(124,92,255,.32);">'+label+p.icon+' '+p.name+'</button>';
  document.getElementById("continueBtn").onclick=()=>start(idx); }

/* ---- 今日复习篇：读完的篇目每天自动指定 1–2 篇复习（错得多的优先，其次最久没读的；再按日期轮换）。
   同一天怎么刷新都不变，第二天自动换。还有新篇没读时只安排 1 篇复习，新篇优先。 ---- */
function playedToday(title){ const r=STORE.days[dkey(new Date())]; return !!(r&&r.mods&&r.mods[title]); }
function weakCount(title){ let n=0; (STORE.review||[]).forEach(r=>{ if(r&&r.m===title) n++; }); return n; }
function todayPicks(){
  const doneIdx=[]; PASSAGES.forEach((p,i)=>{ if(STORE.done[p.title]) doneIdx.push(i); });
  if(!doneIdx.length) return [];
  const hasNew=PASSAGES.some(p=>!STORE.done[p.title]);
  const last=STORE.last||{};
  const need=doneIdx.slice().sort((a,b)=> weakCount(PASSAGES[b].title)-weakCount(PASSAGES[a].title)
    || String(last[PASSAGES[a].title]||"").localeCompare(String(last[PASSAGES[b].title]||""))
    || a-b);
  const picks=[need[0]];
  if(!hasNew && doneIdx.length>1){
    const t=new Date(), dayNum=t.getFullYear()*372+t.getMonth()*31+t.getDate();
    let j=dayNum%doneIdx.length; if(doneIdx[j]===picks[0]) j=(j+1)%doneIdx.length;
    picks.push(doneIdx[j]);
  }
  return picks;
}

function makeCard(idx,curIdx,timeUp,isPick){ const p=PASSAGES[idx]; const b=document.createElement("button");
  const prevDone=(idx===0)||!!STORE.done[PASSAGES[idx-1].title];
  const done=!!STORE.done[p.title], locked=timeUp||!prevDone, isCur=(idx===curIdx)&&!timeUp;
  const num=NUM[idx]||((idx+1)+".");
  const reviewedToday = isPick && playedToday(p.title);
  let stt = timeUp?'⏰ 今天时间用完啦'
          : isPick?(reviewedToday?'🎉 今天复习完啦':'📅 今天复习这一篇')
          : done?'✓ 读过啦（可复习）':locked?'🔒 先读上一篇':isCur?'👉 现在读这个':(p.sub||'读短文 · 答题');
  b.className="lv "+p.cls;
  b.innerHTML='<span class="i">'+p.icon+'</span><span class="n">'+num+' '+p.name+'</span><span class="d">'+stt+'</span>';
  if(locked){ b.style.opacity="0.45"; b.style.filter="grayscale(0.6)";
    b.onclick=()=>alert(timeUp?"今天语文的时间用完啦，明天再来挑战！":"先把前面的读完，再读这一篇哦 😊"); }
  else b.onclick=()=>start(idx);
  if(isCur) b.style.boxShadow="0 0 0 4px #ffd34d, 0 8px 20px rgba(0,0,0,.18)";
  else if(isPick && !reviewedToday && !timeUp) b.style.boxShadow="0 0 0 4px #9fd0ff, 0 8px 20px rgba(0,0,0,.14)";
  else if(done) b.style.outline="3px solid #c9b8ff";
  return b; }

function renderMenu(){ const m=document.getElementById("menu"); m.innerHTML="";
  renderTimeBanner();
  const timeUp = remainSec()<=0;
  let curIdx=-1;
  for(let i=0;i<PASSAGES.length;i++){ const prevDone=(i===0)||!!STORE.done[PASSAGES[i-1].title]; if(prevDone && !STORE.done[PASSAGES[i].title]){ curIdx=i; break; } }
  const picks=todayPicks();
  renderContinueBar(curIdx, timeUp, picks);

  const activeIdx=[], doneIdxArr=[];
  PASSAGES.forEach((p,idx)=>{ (STORE.done[p.title] ? doneIdxArr : activeIdx).push(idx); });
  activeIdx.forEach(idx=>{ m.appendChild(makeCard(idx, curIdx, timeUp)); });

  // 今天的复习篇：单独亮出来，不埋进折叠区
  if(picks.length){
    const head=document.createElement("div");
    head.style.cssText="grid-column:1/-1;text-align:center;font-size:15px;font-weight:bold;color:#7c5cff;margin-top:14px;";
    head.textContent="📅 今天的复习篇";
    m.appendChild(head);
    picks.forEach(idx=>{ m.appendChild(makeCard(idx, curIdx, timeUp, true)); });
  }

  const restIdx=doneIdxArr.filter(idx=>picks.indexOf(idx)<0);
  if(restIdx.length){
    const wrap=document.createElement("div"); wrap.style.cssText="grid-column:1/-1;text-align:center;margin-top:14px;";
    const toggle=document.createElement("button");
    toggle.textContent="✓ 其他已读过的 "+restIdx.length+" 篇（想多读点这里）";
    toggle.style.cssText="background:none;border:2px dashed #ccc;color:#999;padding:8px 18px;border-radius:12px;font-size:14px;cursor:pointer;font-family:inherit;";
    const doneGrid=document.createElement("div");
    doneGrid.className="menu"; doneGrid.style.cssText="display:none;margin-top:12px;";
    restIdx.forEach(idx=>{ doneGrid.appendChild(makeCard(idx, curIdx, timeUp)); });
    toggle.onclick=()=>{ doneGrid.style.display = doneGrid.style.display==="none" ? "grid":"none"; };
    wrap.appendChild(toggle); m.appendChild(wrap); m.appendChild(doneGrid);
  }
}
renderMenu();
function backToMenu(){ tickTime(); sessionStart=null; document.getElementById("done").style.display="none"; document.getElementById("card").style.display="none"; document.getElementById("menu").style.display=""; renderMenu(); }
function start(idx){
  if(remainSec()<=0){ alert("今天语文的时间用完啦，明天再来挑战！"); return; }
  cur=PASSAGES[idx]; qi=0; combo=0; roundStars=0; roundGuessed=0; bestCombo=0; sessionStart=Date.now();
  if(cur.gen){ cur.questions=buildGenRound(cur); }   // 字词句生成题：每次进来现出一批新题
  else { if(!cur.__all) cur.__all=cur.questions; cur.questions=pickDaily(cur); }   // 阅读题：每次 3 道，按日轮换、错题必出
  document.getElementById("menu").style.display="none"; document.getElementById("done").style.display="none";
  document.getElementById("card").style.display="block";
  document.getElementById("ptitle").textContent=cur.title;
  document.getElementById("ptext").innerHTML=cur.text;
  const pic=document.getElementById("ppic");
  if(cur.img){ pic.src=cur.img; pic.style.display="block"; } else { pic.style.display="none"; pic.removeAttribute("src"); }
  showQ(); }
function showQ(){ answered=false; firstWrong=false;
  const total=cur.questions.length; const item=cur.questions[qi];
  document.getElementById("prog").textContent="📖 "+cur.title+"　第 "+(qi+1)+" / "+total+" 题"+(combo>=2?"　🔥连对"+combo:"");
  setBar(qi,total);
  document.getElementById("qtag").textContent=item.tag;
  document.getElementById("q").innerHTML=item.q;
  document.getElementById("fb").textContent=""; document.getElementById("fb").className="feedback";
  document.getElementById("nextBtn").style.display="none";
  const area=document.getElementById("answerArea"); area.innerHTML="";
  shuffle(item.options).forEach(o=>{ const b=document.createElement("button"); b.className="opt"; b.textContent=o; b.onclick=()=>pick(b,o); area.appendChild(b); });
}
function pick(el,val){ if(answered)return; const item=cur.questions[qi];
  if(val===item.answer){ el.classList.add("right"); good(); }
  else { el.classList.add("wrong"); el.textContent="✗ "+el.textContent; el.onclick=null; bad(item); } }
const PRAISE=["读得真仔细！","答对啦！","你真会读！","厉害！","就是这样！"];
function good(){ answered=true; const fb=document.getElementById("fb");
  const item=cur.questions[qi]; const k=(item.q||"").replace(/<[^>]+>/g,"").trim();
  const r=todayRec(); if(!r.awarded) r.awarded={};
  if(!firstWrong){
    if(r.awarded[k]){ saveStore(); sndRight(); fb.className="feedback ok"; fb.textContent="✅ 对啦！这题今天已经拿过 ⭐ 了——读没读过的篇目才加星哦"; }
    else { r.awarded[k]=true; r.stars++; r.correct++; saveStore(); showStarNow(); floatPlus(); roundStars++; combo++; if(combo>bestCombo)bestCombo=combo; sndRight();
      let msg=PRAISE[Math.floor(Math.random()*PRAISE.length)]+" ⭐"; if(combo>=3){ msg="🔥 连对 "+combo+" 个！ "+msg; sndCombo(); burst(["🔥","⭐","🌟"]); }
      fb.className="feedback ok"; fb.textContent=msg; }
  } else { r.guessed=(r.guessed||0)+1; saveStore(); roundGuessed++; combo=0;
    fb.className="feedback ok"; fb.textContent="答对了！这题先记下来，下次争取一次就对 ✊（这题不加星）"; }
  setBar(qi+1,cur.questions.length);
  document.getElementById("nextBtn").style.display="block";
}
function bad(item){ if(!firstWrong){ firstWrong=true; recordMiss(item); } combo=0; sndWrong();
  const fb=document.getElementById("fb"); fb.className="feedback no"; fb.textContent="✗ 再读读短文～ 提示："+(item.hint||"答案就在文章里哦"); }
function recordMiss(item){ try{ STORE.review.push({d:dkey(new Date()),m:cur.title,q:(item.q||"").replace(/<[^>]+>/g," ").trim()}); if(STORE.review.length>80)STORE.review=STORE.review.slice(-80); saveStore(); }catch(e){} }
function nextQ(){ qi++; tickTime();
  // 时间额度只卡"要不要开始读下一篇"，正在读的这一篇不会中途被打断
  if(qi>=cur.questions.length){ finish(); } else { showQ(); } }
function finish(){ document.getElementById("card").style.display="none";
  if(cur){ STORE.done[cur.title]=true;                  // 读完这篇 → 解锁下一篇
    STORE.last[cur.title]=dkey(new Date());             // 记录"最近一次读"→ 复习轮换按它挑最久没读的
    const r=todayRec(); if(!r.mods) r.mods={}; r.mods[cur.title]=true;   // 今天读过 → 复习篇打勾
    saveStore(); }
  const d=document.getElementById("done"); d.style.display="block";
  if(!document.getElementById("toMenuBtn")){ const bt=document.createElement("button"); bt.id="toMenuBtn"; bt.className="ghost"; bt.textContent="📋 选别的篇目"; bt.onclick=backToMenu; d.appendChild(bt); }
  const perfect=(roundStars===cur.questions.length);
  document.getElementById("doneMsg").textContent= perfect ? "🏆 《"+cur.title+"》全部一次答对！" : "《"+cur.title+"》读完啦！";
  document.getElementById("doneGot").innerHTML="这一篇：一次答对 <b>"+roundStars+"</b> 题（得 "+roundStars+" ⭐）"+(roundGuessed?("，试出来 "+roundGuessed+" 题（不加星）"):"")+(bestCombo>=3?("<br>最高连对 🔥"+bestCombo):"")+"<br>今天一共 ⭐ "+todayRec().stars+" 颗（每5颗⭐换1朵🌸！）";
  sndFinish(); burst(perfect?["🏆","🎉","⭐","🌟","✨"]:null);
}
</script>

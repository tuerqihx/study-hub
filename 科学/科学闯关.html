<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桃桃的科学闯关 🔬</title>
<style>
  * { box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html,body { margin:0; padding:0; }
  body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:linear-gradient(160deg,#e6fff4 0%,#e3f7ff 100%); color:#2f4a44; min-height:100vh; padding:18px 16px 50px; }
  .wrap { max-width:760px; margin:0 auto; }
  .bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .back { background:#fff; border:2px solid #9fe6c8; color:#1fae8c; font-weight:bold; font-size:16px;
    padding:8px 16px; border-radius:14px; cursor:pointer; font-family:inherit; }
  .star-now { font-size:18px; font-weight:bold; color:#1fae8c; }
  h1 { text-align:center; font-size:30px; margin:4px 0 16px; }
  .menu { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
  .lv { border:none; color:#fff; border-radius:22px; padding:20px 12px; cursor:pointer; font-family:inherit;
    text-align:center; box-shadow:0 6px 16px rgba(0,0,0,.12); transition:transform .12s; }
  .lv:hover { transform:translateY(-4px) scale(1.02); } .lv:active { transform:scale(.97); }
  .lv .i { font-size:42px; display:block; } .lv .n { font-size:19px; font-weight:bold; margin-top:6px; }
  .l1{background:linear-gradient(140deg,#ff9a56,#ff6b6b);} .l2{background:linear-gradient(140deg,#56d6a0,#1fae8c);}
  .l3{background:linear-gradient(140deg,#5ac8fa,#3b82f6);} .l4{background:linear-gradient(140deg,#9b8cff,#7c5cff);}
  .l5{background:linear-gradient(140deg,#ffcf5c,#ff9f43);}
  .card { background:#fff; border-radius:24px; padding:22px 20px; box-shadow:0 6px 20px rgba(80,200,160,.18);
    border:3px solid #bdeedd; display:none; }
  .progress { font-size:14px; color:#aaa; text-align:center; margin-bottom:6px; }
  .tip { background:#eafff6; border-radius:14px; padding:10px 14px; font-size:15px; color:#2f8a6f; margin-bottom:14px; line-height:1.5; }
  .q { font-size:23px; line-height:1.5; text-align:center; margin:6px 0 18px; min-height:56px; } .q b{color:#1fae8c;}
  .opts { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .opt { background:#f1fbf7; border:2px solid #cdeee2; border-radius:16px; padding:16px; font-size:20px; font-weight:bold;
    cursor:pointer; font-family:inherit; color:#2f4a44; transition:.1s; }
  .opt:hover{background:#e3f7ef;} .opt:active{transform:scale(.97);}
  .opt.right{background:#d7f7e3;border-color:#56d6a0;} .opt.wrong{background:#ffe1e1;border-color:#ff8585;}
  .feedback { text-align:center; font-size:22px; font-weight:bold; min-height:34px; margin:14px 0 6px; }
  .feedback.ok{color:#1fae8c;} .feedback.no{color:#ff8c42;}
  .next { display:none; background:#1fae8c; color:#fff; border:none; border-radius:16px; font-size:20px; font-weight:bold;
    padding:14px 30px; cursor:pointer; font-family:inherit; margin:6px auto 0; }
  .done { display:none; text-align:center; background:#fff; border-radius:24px; padding:30px 20px;
    box-shadow:0 6px 20px rgba(80,200,160,.2); border:3px solid #bdeedd; }
  .done .big{font-size:64px;} .done .msg{font-size:24px;font-weight:bold;margin:10px 0;}
  .done .got{font-size:19px;color:#1fae8c;margin-bottom:18px;}
  .done button{background:#1fae8c;color:#fff;border:none;border-radius:16px;font-size:19px;font-weight:bold;
    padding:13px 26px;cursor:pointer;font-family:inherit;margin:6px;}
  .done .ghost{background:#fff;color:#1fae8c;border:2px solid #9fe6c8;}
</style>
</head>

<div class="wrap">

<script>
/* 配置：存储/游戏逻辑由 ../_engine/quiz.js 提供 */
const STORE_KEY="taotao_science_v1";
const TIME_LIMIT_MIN=12; // 每天这一科的时间额度（分钟），用完锁到明天
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function sample(a,n){return shuffle(a).slice(0,n);}
/* 换壳出题：从概念池里随机取一条，题干(s[])随机换一种说法；有 o 就是选择题，没有就是填数 */
function shellGen(POOL){ return function(){ const it=pick(POOL); const base={q:pick(it.s), hint:it.h};
  if(it.o){ base.type="choice"; base.options=it.o.slice(); base.answer=it.a; }
  else { base.type="number"; base.answer=it.a; }
  return base; }; }

const MODULES = {
  magnet:{ name:"磁铁的秘密", icon:"🧲", cls:"l1",
    tip:"🔬 动手玩：拿一块磁铁，去家里找找它能吸住哪些东西、吸不住哪些，记在小本上。",
    gen(){
      const IRON=["铁钉","曲别针","小铁夹","缝衣针","图钉","铁螺丝","铁勺子","铁钥匙","铁片"];
      const NONIRON=["塑料尺","橡皮","木头筷子","玻璃球","塑料瓶盖","纸片","陶瓷杯","铅笔","木积木","布娃娃"];
      const t=rnd(1,10);
      if(t<=3){ // 真随机：哪个能被吸
        const yes=pick(IRON), no=sample(NONIRON,2);
        return {q:pick(["下面哪个能被磁铁吸住？","磁铁能吸住下面哪个？","哪样东西会被磁铁吸过去？"]),
          type:"choice", options:shuffle([yes,no[0],no[1]]), answer:yes, hint:"磁铁只吸铁一类的东西，"+yes+"是铁做的。"};
      }
      if(t<=6){ // 真随机：哪个不能被吸
        const no=pick(NONIRON), yes=sample(IRON,2);
        return {q:pick(["下面哪个不能被磁铁吸住？","哪样东西磁铁吸不住？","哪个不会被磁铁吸过去？"]),
          type:"choice", options:shuffle([no,yes[0],yes[1]]), answer:no, hint:no+"不是铁做的，所以吸不住。"};
      }
      // 概念题：换壳
      return shellGen([
        {s:["磁铁两端磁力最强的地方叫什么？","磁铁哪里的磁力最强？"], o:["磁极","中间","边边"], a:"磁极", h:"两头叫磁极，磁力最强。"},
        {s:["能自由转动的磁铁（指南针）总是指向？","指南针静止后，两头指着哪个方向？"], o:["南和北","东和西"], a:"南和北", h:"所以叫'指南'针。"},
        {s:["两块磁铁'相同的极'靠近，会怎样？","把两块磁铁的同名极对着凑近，会？"], o:["互相推开","紧紧吸住"], a:"互相推开", h:"同极相斥（推开），异极相吸。"},
        {s:["两块磁铁'不同的极'(一个N一个S)靠近，会？","磁铁的N极对着另一块的S极，会？"], o:["互相吸住","互相推开"], a:"互相吸住", h:"异极相吸，同极相斥。"},
        {s:["隔着一张薄纸，磁铁还能吸住铁钉吗？","中间垫一张纸，磁铁还吸得住铁钉吗？"], o:["能，磁力能穿过纸","完全不能"], a:"能，磁力能穿过纸", h:"磁力能穿过薄薄的纸。"},
        {s:["冰箱贴能贴在冰箱门上，是因为门里有？","为什么冰箱贴能牢牢贴住冰箱门？"], o:["铁一类的金属","塑料","木头"], a:"铁一类的金属", h:"磁铁只能吸住铁一类的东西。"},
        {s:["图钉和沙子混在一起，怎样最快把图钉分出来？","一堆铁屑掉进沙子里，用什么办法捡最快？"], o:["用磁铁吸","用手一个个挑","用水冲"], a:"用磁铁吸", h:"磁铁能一下把铁的东西吸出来。"},
        {s:["指南针能指方向，是因为地球本身就像？","为什么指南针总能指南北？因为地球像个？"], o:["一块巨大的磁铁","一块石头","一团火"], a:"一块巨大的磁铁", h:"地球有自己的磁场。"},
        {s:["把一块磁铁摔成两半，会变成？","一根磁铁断成两截，每一截会？"], o:["两块都有磁性的小磁铁","没有磁性的铁块","两块只有一个磁极"], a:"两块都有磁性的小磁铁", h:"每一半仍是完整磁铁，各有两极。"},
      ])();
    }},
  plant:{ name:"植物的一生", icon:"🌱", cls:"l2",
    tip:"🔬 动手玩：泡几颗绿豆，每天给它画一笔、拍张照，看几天后冒出小芽。",
    gen:shellGen([
      {s:["种子发芽，最先长出来的是？","一颗种子泡在土里，先冒出来的是它的哪部分？"], o:["根","花","果实"], a:"根", h:"先扎根，再长芽。"},
      {s:["植物的叶子制造养料，主要靠？","叶子给自己'做饭'，靠的是什么？"], o:["阳光","月光","灯光"], a:"阳光", h:"叶子靠阳光做饭，叫光合作用。"},
      {s:["花谢了以后，常常会结出？","花朵凋谢之后，接着会长出什么？"], o:["果实和种子","新的根"], a:"果实和种子", h:"花→果实→种子，又能种出新植物。"},
      {s:["植物喝水，主要靠身体的哪部分吸？","植物是用哪个部位从土里吸水的？"], o:["根","花瓣"], a:"根", h:"根在土里吸水。"},
      {s:["种子要发芽，一般需要？","想让绿豆发芽，得给它什么条件？"], o:["水、空气和合适的温度","只要黑暗","只要一块石头"], a:"水、空气和合适的温度", h:"泡绿豆时给它水和温暖。"},
      {s:["我们吃的胡萝卜，是植物的哪一部分？","胡萝卜其实是植物的什么？"], o:["根","花","叶子"], a:"根", h:"胡萝卜是长在土里的根。"},
      {s:["向日葵的大花盘喜欢朝着？","向日葵总是把大脸盘对着谁？"], o:["太阳","地面","月亮"], a:"太阳", h:"所以它又叫朝阳花。"},
      {s:["给花浇水，应该浇在？","浇花时水该浇到哪里才对？"], o:["根部的土里","花瓣上","叶子尖上"], a:"根部的土里", h:"根在土里喝水。"},
      {s:["秋天很多树叶变黄、掉落，这是？","一到秋天树叶发黄掉光，说明？"], o:["正常现象，准备过冬","树生病了","被虫吃光了"], a:"正常现象，准备过冬", h:"落叶是树过冬的本领。"},
      {s:["大部分植物开花，主要是为了？","植物费劲开花，最重要的目的是？"], o:["繁殖，结出果实和种子","好看","吸引蜜蜂玩耍"], a:"繁殖，结出果实和种子", h:"传粉之后，花才能结出果实种子。"},
      {s:["仙人掌的叶子为什么变成了细细的刺？","为什么仙人掌不长大叶子，只长刺？"], o:["减少水分蒸发，适应缺水的沙漠","为了扎人","为了好看"], a:"减少水分蒸发，适应缺水的沙漠", h:"叶子变小，蒸发的水分就变少。"},
      {s:["移栽小树苗时要连着土一起挖，是为了？","挖树苗为什么要带一大坨土？"], o:["保护根，让它更容易活下来","土比较好看","比较省事"], a:"保护根，让它更容易活下来", h:"带着土移栽能减少伤根。"},
      {s:["同一棵向日葵，为什么早上和傍晚朝向不一样？","向日葵一天里会转方向，这是为什么？"], o:["它会跟着太阳转动","被风吹的","它在睡觉"], a:"它会跟着太阳转动", h:"这叫向日性，一直朝着太阳。"},
    ]),},
  food:{ name:"食物与消化", icon:"🍚", cls:"l3",
    tip:"🔬 动手玩：吃饭时数一数，一口饭嚼多少下才咽下去？慢慢嚼更好消化哦。",
    gen:shellGen([
      {s:["食物进入身体，第一站是哪里？","我们吃下去的食物，最先到达身体哪个部位？"], o:["口腔(嘴)","胃","肠"], a:"口腔(嘴)", h:"先用嘴和牙齿。"},
      {s:["牙齿的主要作用是？","牙齿在吃饭时帮我们干什么？"], o:["把食物嚼碎","帮助呼吸"], a:"把食物嚼碎", h:"嚼碎了才好消化。"},
      {s:["下面哪个是帮助消化食物的器官？","哪个器官专门负责消化吸收食物？"], o:["胃和肠","心脏"], a:"胃和肠", h:"胃和肠负责消化吸收。"},
      {s:["为了身体健康，应该多吃？","想长得壮又健康，饭桌上要多吃点什么？"], o:["蔬菜和水果","很多糖果","只吃肉"], a:"蔬菜和水果", h:"营养要均衡。"},
      {s:["吃饭前应该先做什么才卫生？","开饭前，为了卫生要先做哪件事？"], o:["洗手","开电视","玩手机"], a:"洗手", h:"洗掉手上的细菌。"},
      {s:["吃饭时怎样对消化最好？","怎样吃饭，肠胃最舒服、最好消化？"], o:["细嚼慢咽","狼吞虎咽","边跑边吃"], a:"细嚼慢咽", h:"嚼得细，胃更轻松。"},
      {s:["食物被嚼碎、咽下去后，先到达哪里？","饭嚼烂咽下去，第一个到的地方是？"], o:["胃","脑子","脚"], a:"胃", h:"嘴→食道→胃。"},
      {s:["想保护牙齿，应该？","要想牙齿不坏掉，平时该怎么做？"], o:["早晚刷牙、少吃糖","顿顿吃糖","从不刷牙"], a:"早晚刷牙、少吃糖", h:"糖吃多了容易蛀牙。"},
      {s:["为什么不能一边跑一边吃东西？","边跑边吃东西为什么很危险？"], o:["容易呛到、噎住，很危险","跑得慢","不礼貌"], a:"容易呛到、噎住，很危险", h:"吃东西要专心，跑动容易呛到。"},
      {s:["米饭、馒头这类主食，主要给身体提供？","吃米饭馒头，主要是给身体补充什么？"], o:["能量","维生素","水分"], a:"能量", h:"主食里的淀粉，是身体能量的重要来源。"},
      {s:["水果和蔬菜里比较丰富的营养是？","多吃蔬菜水果，主要能补到什么营养？"], o:["维生素和纤维","脂肪","盐"], a:"维生素和纤维", h:"多吃蔬果能补充维生素。"},
      {s:["吃太多糖对牙齿有什么影响？","糖吃多了，牙齿会怎么样？"], o:["容易长蛀牙","让牙齿更白","没有影响"], a:"容易长蛀牙", h:"细菌喜欢糖，会腐蚀牙齿。"},
    ]),},
  breath:{ name:"空气与呼吸", icon:"💨", cls:"l4",
    tip:"🔬 动手玩：把手放胸口深吸一口气，感受胸口鼓起来；原地跑十下，再数一分钟呼吸几次。",
    gen:shellGen([
      {s:["我们呼吸，主要用哪个器官？","人吸气呼气，靠身体里的哪个器官？"], o:["肺","胃"], a:"肺", h:"空气进到肺里。"},
      {s:["我们吸进的空气里，对身体最重要的气体是？","空气里哪种气体是身体最需要的？"], o:["氧气","二氧化碳"], a:"氧气", h:"身体需要氧气。"},
      {s:["跑步以后，我们的呼吸会变得？","刚跑完步，呼吸跟平时比会怎样？"], o:["更快","更慢"], a:"更快", h:"运动需要更多氧气，所以呼吸变快。"},
      {s:["我们呼出来的气里，比较多的是？","从嘴里呼出去的气，含得较多的是什么？"], o:["二氧化碳","氧气","水"], a:"二氧化碳", h:"吸进氧气，呼出二氧化碳。"},
      {s:["树木花草白天会放出我们需要的？","白天，绿色植物会往空气里放出什么？"], o:["氧气","烟","灰尘"], a:"氧气", h:"所以多种树空气更好。"},
      {s:["为什么跑步后要大口大口喘气？","跑完为什么忍不住大口喘？"], o:["身体需要更多氧气","在唱歌","觉得好玩"], a:"身体需要更多氧气", h:"运动费氧气，要赶紧补。"},
      {s:["平时呼吸，最好用？","平常呼吸，用哪里最好？"], o:["鼻子(能挡住脏东西)","一直张嘴","憋着不呼吸"], a:"鼻子(能挡住脏东西)", h:"鼻毛能过滤灰尘。"},
      {s:["遇到很多烟的地方(比如火灾)，应该？","碰上浓烟(比如着火了)，正确做法是？"], o:["捂住口鼻、弯腰快走","大口呼吸","站着不动"], a:"捂住口鼻、弯腰快走", h:"烟往上飘，低处空气好些。"},
      {s:["打哈欠可能是身体在提醒你？","一直打哈欠，往往说明身体？"], o:["有点累了，需要休息","很开心","要长高了"], a:"有点累了，需要休息", h:"困倦、缺氧时容易打哈欠。"},
      {s:["在人多不通风的房间待久了，会觉得？","一屋子人又不开窗，待久了人会？"], o:["闷、有点喘不过气","更精神","更暖和"], a:"闷、有点喘不过气", h:"空气不流通，氧气变少了。"},

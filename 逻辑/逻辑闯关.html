<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桃桃的逻辑闯关 🧩</title>
<style>
  * { box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html,body { margin:0; padding:0; }
  body { font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
    background:linear-gradient(160deg,#fff6e0 0%,#fff0f6 100%); color:#4a4030; min-height:100vh; padding:18px 16px 50px; }
  .wrap { max-width:760px; margin:0 auto; }
  .bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .back { background:#fff; border:2px solid #ffd98a; color:#f59f00; font-weight:bold; font-size:16px;
    padding:8px 16px; border-radius:14px; cursor:pointer; font-family:inherit; }
  .star-now { font-size:18px; font-weight:bold; color:#f59f00; }
  h1 { text-align:center; font-size:30px; margin:4px 0 16px; }
  .menu { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; }
  .lv { border:none; color:#fff; border-radius:22px; padding:22px 14px; cursor:pointer; font-family:inherit;
    text-align:center; box-shadow:0 6px 16px rgba(0,0,0,.12); transition:transform .12s; }
  .lv:hover{transform:translateY(-4px) scale(1.02);} .lv:active{transform:scale(.97);}
  .lv .i{font-size:46px;display:block;} .lv .n{font-size:21px;font-weight:bold;margin-top:6px;} .lv .d{font-size:13px;opacity:.92;margin-top:3px;}
  .l1{background:linear-gradient(140deg,#ffcf5c,#ff9f43);} .l2{background:linear-gradient(140deg,#9b8cff,#7c5cff);} .l3{background:linear-gradient(140deg,#5ac8fa,#3b82f6);}
  .l4{background:linear-gradient(140deg,#56d6a0,#1fae8c);} .l5{background:linear-gradient(140deg,#ff8fb3,#ff5c8a);}
  .card { background:#fff; border-radius:24px; padding:22px 20px; box-shadow:0 6px 20px rgba(255,180,80,.18);
    border:3px solid #ffe7b8; display:none; }
  .progress { font-size:14px; color:#aaa; text-align:center; margin-bottom:6px; }
  .tip { background:#fff7e6; border-radius:14px; padding:10px 14px; font-size:15px; color:#a6772f; margin-bottom:14px; line-height:1.5; }
  .q { font-size:24px; line-height:1.5; text-align:center; margin:6px 0 18px; min-height:60px; } .q b{color:#f59f00;}
  .opts { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .opt { background:#fff8ec; border:2px solid #ffe4b3; border-radius:16px; padding:16px; font-size:22px; font-weight:bold;
    cursor:pointer; font-family:inherit; color:#4a4030; transition:.1s; }
  .opt:hover{background:#fff1d6;} .opt:active{transform:scale(.97);}
  .opt.right{background:#d7f7e3;border-color:#56d6a0;} .opt.wrong{background:#ffe1e1;border-color:#ff8585;}
  .answbox{text-align:center;margin-bottom:12px;}
  .answ{display:inline-block;min-width:120px;font-size:34px;font-weight:bold;color:#7c5cff;border-bottom:4px solid #e3d6ff;padding:4px 18px;letter-spacing:2px;}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:320px;margin:0 auto;}
  .key{background:#fff8ec;border:2px solid #ffe4b3;border-radius:14px;padding:16px;font-size:24px;font-weight:bold;cursor:pointer;font-family:inherit;color:#4a4030;}
  .key:active{transform:scale(.95);background:#fff1d6;} .key.go{background:#56d6a0;color:#fff;border-color:#56d6a0;} .key.del{background:#ffd9b0;border-color:#ffd9b0;}
  .feedback{text-align:center;font-size:22px;font-weight:bold;min-height:34px;margin:14px 0 6px;} .feedback.ok{color:#1fae8c;} .feedback.no{color:#ff8c42;}
  .next{display:none;background:#f59f00;color:#fff;border:none;border-radius:16px;font-size:20px;font-weight:bold;padding:14px 30px;cursor:pointer;font-family:inherit;margin:6px auto 0;}
  .done{display:none;text-align:center;background:#fff;border-radius:24px;padding:30px 20px;box-shadow:0 6px 20px rgba(255,180,80,.2);border:3px solid #ffe7b8;}
  .done .big{font-size:64px;} .done .msg{font-size:24px;font-weight:bold;margin:10px 0;} .done .got{font-size:19px;color:#f59f00;margin-bottom:18px;}
  .done button{background:#f59f00;color:#fff;border:none;border-radius:16px;font-size:19px;font-weight:bold;padding:13px 26px;cursor:pointer;font-family:inherit;margin:6px;}
  .done .ghost{background:#fff;color:#f59f00;border:2px solid #ffd98a;}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar">
    <button class="back" onclick="goHome()">🏡 回学习台</button>
    <span class="star-now" id="starNow">今天 ⭐ 0</span>
  </div>
  <h1>🧩 桃桃的逻辑闯关</h1>
  <div class="menu" id="menu"></div>
  <div class="card" id="card">
    <div class="progress" id="prog"></div>
    <div class="tip" id="tip"></div>
    <div class="q" id="q"></div>
    <div id="answerArea"></div>
    <div class="feedback" id="fb"></div>
    <button class="next" id="nextBtn" onclick="nextQ()">下一题 →</button>
  </div>
  <div class="done" id="done">
    <div class="big">🎉</div>
    <div class="msg" id="doneMsg"></div>
    <div class="got" id="doneGot"></div>
    <button onclick="restart()">再来一关</button>
    <button class="ghost" onclick="goHome()">回学习台</button>
  </div>
</div>
<script>
/* 配置：存储/游戏逻辑由 ../_engine/quiz.js 提供 */
const STORE_KEY="taotao_logic_v1";
const TIME_LIMIT_MIN=12; // 每天这一科的时间额度（分钟），用完锁到明天
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function rnd(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function sample(a,n){return shuffle(a).slice(0,n);}

const MODULES = {
  /* —— 找规律：自动随机出题，永远不重复 —— */
  pattern:{ name:"找规律", icon:"🔢", cls:"l1",
    tip:"💡 先看每一个数(或图)比前一个多了什么、变了什么，找出'藏起来的规律'。",
    gen(){ const t=rnd(1,7);
      if(t===1){ const s=rnd(1,9), d=[2,3,4,5][rnd(0,3)]; return {q:[s,s+d,s+2*d,s+3*d].join(", ")+", <b>?</b>", type:"number", answer:s+4*d, hint:"每次多 "+d+"。"}; }
      if(t===2){ const s=rnd(22,40), d=[1,2,3][rnd(0,2)]; return {q:[s,s-d,s-2*d,s-3*d].join(", ")+", <b>?</b>", type:"number", answer:s-4*d, hint:"每次少 "+d+"。"}; }
      if(t===3){ const s=[1,2,3][rnd(0,2)]; return {q:[s,s*2,s*4,s*8].join(", ")+", <b>?</b>", type:"number", answer:s*16, hint:"每次翻一倍(×2)。"}; }
      if(t===4){ const a=["🔴","🟡","🔵","🟢","⭐","❤️"]; let x=a[rnd(0,5)],y=a[rnd(0,5)]; while(y===x)y=a[rnd(0,5)];
        return {q:[x,y,x,y,x].join("")+" 后面是？", type:"choice", options:shuffle([x,y]), answer:y, hint:"两个交替出现。"}; }
      if(t===5){ const a=["🐶","🐱","🐰","🐻","🦊","🐯"]; const p=shuffle(a).slice(0,3);
        return {q:[p[0],p[1],p[2],p[0],p[1]].join("")+" 后面是？", type:"choice", options:shuffle(p), answer:p[2], hint:"三个一组，循环重复。"}; }
      if(t===6){ const s=rnd(1,5), d0=rnd(1,3), inc=rnd(1,2);
        let seq=[s], d=d0; for(let i=0;i<4;i++){ seq.push(seq[seq.length-1]+d); d+=inc; }
        return {q:"🚀 "+seq.join(", ")+", <b>?</b>", type:"number", answer:seq[seq.length-1]+d, hint:"这次每次多的数量也在变——看看每次比上次多加了几。"}; }
      const s=rnd(1,4); const seq=[]; for(let i=0;i<3;i++){ seq.push(s+i); seq.push((s+i)*10); }
      return {q:"🚀 "+seq.join(", ")+", <b>?</b>", type:"number", answer:s+3, hint:"藏着两条规律：单数位置在数数，双数位置是它的10倍。"};
    }},

  /* —— 谁不一样：分类归纳 —— */
  classify:{ name:"谁不一样", icon:"🧩", cls:"l2",
    tip:"💡 它们大多是'同一类'，只有一个是'外人'。把那个外人找出来，并想清楚理由。",
    gen(){
      const CATS={
        水果:["苹果","香蕉","西瓜","葡萄","桃子","梨","草莓","橘子","菠萝"],
        蔬菜:["萝卜","白菜","土豆","黄瓜","茄子","菠菜","西红柿","豆角"],
        动物:["老虎","狮子","大象","猴子","兔子","小猫","小狗","小鸟","熊猫"],
        文具:["铅笔","尺子","橡皮","订书机","卷笔刀","钢笔","文具盒"],
        交通工具:["汽车","飞机","火车","轮船","自行车","公交车","地铁"],
        家具:["桌子","椅子","沙发","床","书柜","衣柜"],
        乐器:["钢琴","小提琴","吉他","鼓","笛子","二胡"],
        身体部位:["手","脚","眼睛","鼻子","耳朵","嘴巴","手指"],
        颜色:["红色","黄色","蓝色","绿色","紫色","黑色","白色"],
        形状:["圆形","方形","三角形","长方形","五角星"],
      };
      const keys=Object.keys(CATS);
      const mainK=pick(keys);
      let outK=pick(keys); while(outK===mainK) outK=pick(keys);
      const two=sample(CATS[mainK],2), out=pick(CATS[outK]);
      const opts=shuffle([two[0],two[1],out]);
      const q=pick([
        "哪个不是一类？",
        "哪个和另外两个不是一伙的？",
        "三个里面，哪个是'外人'？",
        "哪个不是"+mainK+"？",
      ]);
      return {q, type:"choice", options:opts, answer:out,
        hint:out+"是"+outK+"，另外两个（"+two.join("、")+"）是"+mainK+"。"};
    }},

  /* —— 推理小侦探：排除/条件推理 —— */
  detect:{ name:"推理小侦探", icon:"🕵️", cls:"l3",
    tip:"💡 把每句话当线索，一条一条排除，剩下的就是答案。",
    gen(){
      const NAMES=["小明","小红","小华","小刚","小强","小亮","小杰","小伟","小英","小方","小丽","乐乐","桃桃","小美"];
      const t=rnd(1,5);
      if(t===1){ // 比较链：A比B…，B比C…，谁最…
        const cmp=pick([{m:"高",l:"矮"},{m:"快",l:"慢",v:"跑得"},{m:"远",l:"近",v:"跳得"},{m:"重",l:"轻"},{m:"大",l:"小",v:"年纪"}]);
        const p=sample(NAMES,3), v=cmp.v||"";
        const askMost=Math.random()<0.5;
        return {q:p[0]+"比"+p[1]+v+cmp.m+"，"+p[1]+"比"+p[2]+v+cmp.m+"。谁"+(askMost?"最"+cmp.m:"最"+cmp.l)+"？",
          type:"choice", options:shuffle([p[0],p[1],p[2]]), answer:askMost?p[0]:p[2],
          hint:p[0]+" > "+p[1]+" > "+p[2]+"（按"+cmp.m+"），"+(askMost?"最"+cmp.m+"的是排头":"最"+cmp.l+"的是排尾")+"。"};
      }
      if(t===2){ // 二选一排除
        const pair=pick([["红球","蓝球"],["茶","水"],["晴天","阴天"],["苹果","橘子"],["语文书","数学书"],["猫","狗"]]);
        const a=pair[0], b=pair[1], noIdx=rnd(0,1), no=pair[noIdx], yes=pair[1-noIdx];
        const cont=pick(["盒子里","杯子里","袋子里","桌上"]), who=pick(["老师","妈妈","爸爸","同学"]);
        return {q:cont+"不是"+a+"就是"+b+"。"+who+"说『不是"+no+"』。那是什么？",
          type:"choice", options:[a,b], answer:yes, hint:"排除"+no+"，就只剩"+yes+"了。"};
      }
      if(t===3){ // 数量增减
        const obj=pick(["苹果","铅笔","糖","小球","饼干","气球","橘子"]);
        const n=rnd(4,9), take=rnd(1,3), add=rnd(1,4);
        return {q:"桌上有 "+n+" 个"+obj+"，"+pick(["拿走","吃掉","送人"])+" "+take+" 个，又放上 "+add+" 个。现在有几个？",
          type:"number", answer:n-take+add, hint:n+" − "+take+" + "+add+" = "+(n-take+add)+"。"};
      }
      if(t===4){ // 星期几
        const wk=["一","二","三","四","五","六","日"];
        const today=rnd(0,6), off=pick([1,2]), idx=(today+off)%7;
        const wrong1=(idx+1)%7, wrong2=(idx+6)%7;
        return {q:"今天是星期"+wk[today]+"，那么"+(off===1?"明天":"后天")+"是星期几？",
          type:"choice", options:shuffle(["星期"+wk[idx],"星期"+wk[wrong1],"星期"+wk[wrong2]]), answer:"星期"+wk[idx],
          hint:"从星期"+wk[today]+"往后数 "+off+" 天。"};
      }
      // t===5 中间位置
      const name=pick(NAMES);
      return {q:name+pick(["不是最高，也不是最矮","个子不高也不矮","没排第一，也没排最后"])+"。三个人里，"+name+"排第几？",
        type:"number", answer:2, hint:"不前不后，就是中间——第 2。"};
    }},

  /* —— 事实还是看法：理性思维①（媒介素养的根） —— */
  fact:{ name:"事实还是看法", icon:"⚖️", cls:"l1",
    tip:"💡 事实=能查证、能证明、大家都一样；看法=每个人的喜好或想法，可以不一样。两者要分清楚。",
    gen(){
      const FACTS=[
        ["今天下雨了","看窗外就能查证"],["这本书有 200 页","数一数就知道"],
        ["水烧到 100 度会开","可以做实验验证"],["我们班有 40 个同学","点名就能数出来"],
        ["太阳从东边升起","每天都能看到，谁都一样"],["一个星期有 7 天","是定好的、能查证"],
        ["长颈鹿的脖子很长","用尺子能量，谁都一样"],["一年有十二个月","日历上写得清清楚楚"],
        ["地球是圆的","科学已经证明了"],["冰放在太阳下会化成水","做实验就能看到"],
        ["蜜蜂会采蜜","观察就能知道"],["3 加 2 等于 5","算一算，谁都一样"],
      ];
      const OPIN=[
        ["蓝色是最好看的颜色","每个人喜欢的颜色不一样"],["这部动画片最好看","是个人喜好"],
        ["数学是最难的科目","有人觉得难，有人觉得简单"],["猫比狗可爱","可爱是个人感觉"],
        ["冬天比夏天好","每个人喜欢的季节不同"],["辣的东西最好吃","口味因人而异"],
        ["暑假比寒假好玩","每个人的想法不一样"],["足球是最好玩的运动","每个人喜欢的运动不一样"],
        ["穿裙子比穿裤子好看","好不好看是个人感觉"],["草莓味冰淇淋最棒","是自己的偏好"],
        ["这首歌真好听","好不好听每个人不一样"],["养猫比养狗好","是个人的选择"],
      ];
      const isFact=Math.random()<0.5, item=pick(isFact?FACTS:OPIN);
      const q=pick([
        "『"+item[0]+"』——这是？",
        "『"+item[0]+"』——是事实还是看法？",
        "有人说：『"+item[0]+"』。这句话是？",
      ]);
      return {q, type:"choice", options:["事实","看法"], answer:isFact?"事实":"看法",
        hint:(isFact?"能查证、":"是个人想法、")+item[1]+"，所以是"+(isFact?"事实":"看法")+"。"};
    }},

  /* —— 广告的套路：理性思维②（识别劝说与操纵） —— */
  ad:{ name:"广告的套路", icon:"📢", cls:"l5",
    tip:"💡 广告是想让你买东西。学会问：它有证据吗？是不是在催我、夸大、吓唬我？拿不准就问爸爸妈妈。",
    gen(){ return pick([
      {q:"广告说『喝了它就能变聪明！』，聪明的做法是？", type:"choice", options:["先怀疑：真的吗？有证据吗","马上相信，赶紧买"], answer:"先怀疑：真的吗？有证据吗", hint:"夸大的承诺要先打个问号。"},
      {q:"包装写『99% 的人都说好』，能证明它一定好吗？", type:"choice", options:["不一定，要看是谁、怎么调查的","能，这么多人呢"], answer:"不一定，要看是谁、怎么调查的", hint:"没说清楚的数字不能全信。"},
      {q:"『最后 3 分钟，不买就没了！』这种话是想让你？", type:"choice", options:["着急，来不及想就买","冷静慢慢想清楚"], answer:"着急，来不及想就买", hint:"催你着急，就是不想让你思考。"},
      {q:"明星在广告里说某零食好吃，它就一定健康吗？", type:"choice", options:["不一定，明星是收钱推广的","一定，明星说的"], answer:"不一定，明星是收钱推广的", hint:"代言是工作，不代表真相。"},
      {q:"看到『点这里免费领礼物』，应该？", type:"choice", options:["先问爸爸妈妈，可能是骗人的","马上点进去"], answer:"先问爸爸妈妈，可能是骗人的", hint:"天上不会掉馅饼。"},
      {q:"广告把食物拍得特别诱人，真实的一定一样吗？", type:"choice", options:["不一定，广告会美化","一定一模一样"], answer:"不一定，广告会美化", hint:"照片会精心摆拍。"},
      {q:"『别人都有，你也得有！』这是想让你？", type:"choice", options:["因为攀比而想要","想清楚自己需不需要"], answer:"因为攀比而想要", hint:"别人有，不等于你需要。"},
      {q:"玩游戏时弹出『充钱就能赢』，应该？", type:"choice", options:["不理它，这是想让你花钱","马上充钱"], answer:"不理它，这是想让你花钱", hint:"赢靠本事，不靠花钱。"},
      {q:"『科学家都推荐』但没说是哪位科学家，可信吗？", type:"choice", options:["不太可信，太含糊了","可信，科学家嘛"], answer:"不太可信，太含糊了", hint:"说不清是谁，就要小心。"},
      {q:"『原价 999，现价 99！』你应该？", type:"choice", options:["想想原价是真的吗、我需不需要","太便宜了赶紧抢"], answer:"想想原价是真的吗、我需不需要", hint:"假打折是常见套路。"},
      {q:"广告说『买一送一，机会难得』，你应该？", type:"choice", options:["先想想自己是否真的需要","立刻买两份"], answer:"先想想自己是否真的需要", hint:"不需要的东西，送再多也没用。"},
      {q:"网红说'用了这支笔成绩就能变好'，可信吗？", type:"choice", options:["不可信，成绩靠努力不靠文具","可信，赶紧买一支"], answer:"不可信，成绩靠努力不靠文具", hint:"文具帮不了学习，努力才行。"},
      {q:"广告里模特用了产品后皮肤变得完美无瑕，照片有没有可能被修过？", type:"choice", options:["有可能，广告照片常常被美化","不可能，肯定是真的"], answer:"有可能，广告照片常常被美化", hint:"广告照片常常经过修饰。"},
      {q:"游戏广告说『免费下载』，进去后却一直弹窗要充钱，这说明？", type:"choice", options:["'免费'不代表以后都不花钱，要小心","免费的东西肯定都是好的"], answer:"'免费'不代表以后都不花钱，要小心", hint:"很多'免费'游戏靠内购赚钱。"},
      {q:"广告用很多小朋友说『我喜欢』，就证明这东西一定好吗？", type:"choice", options:["不一定，别人喜欢不代表适合你","一定，那么多人喜欢"], answer:"不一定，别人喜欢不代表适合你", hint:"别人喜欢的，不一定适合自己。"},
    ]); }},

  /* —— 怎么知道是真的：理性思维③（证据 + 独立思考，防盲从） —— */
  evidence:{ name:"怎么知道是真的", icon:"🔍", cls:"l3",
    tip:"💡 判断真假，最该看『有没有证据和道理』，而不是谁声音大、谁人多。不轻信，也不乱否定——先问'你怎么知道的？'。",
    gen(){ return pick([
      {q:"同学说『操场底下埋着宝藏』，最好怎么做？", type:"choice", options:["问他：你怎么知道的？有证据吗","马上相信跑去挖","直接骂他骗人"], answer:"问他：你怎么知道的？有证据吗", hint:"不轻信也不乱否定，先问证据。"},
      {q:"网上看到一条很吓人的消息，应该？", type:"choice", options:["先查查真假、问大人","马上转发给所有人"], answer:"先查查真假、问大人", hint:"没核实的消息别乱传。"},
      {q:"一个人说话很大声、很自信，他说的就一定对吗？", type:"choice", options:["不一定，要看有没有道理和证据","一定对，他那么自信"], answer:"不一定，要看有没有道理和证据", hint:"自信≠正确。"},
      {q:"全班都说 2+2=5，那 2+2 真的等于 5 吗？", type:"choice", options:["不对，事实不会因为人多就改变","对，大家都这么说"], answer:"不对，事实不会因为人多就改变", hint:"真理不是靠人多决定的。"},
      {q:"书上或大人说的，就一定 100% 都对吗？", type:"choice", options:["大多对，但也会有错，可以礼貌地问为什么","100% 都对，不许问"], answer:"大多对，但也会有错，可以礼貌地问为什么", hint:"尊重的同时，也可以提问。"},
      {q:"大家都在做一件你觉得不对的事，你可以？", type:"choice", options:["自己想清楚，对的才做","别人做我就跟着做"], answer:"自己想清楚，对的才做", hint:"自己的脑子要自己用。"},
      {q:"有人说『因为是我说的，你就必须信』，这个理由好吗？", type:"choice", options:["不好，这不是真正的理由","好，他很厉害"], answer:"不好，这不是真正的理由", hint:"讲道理才算理由。"},
      {q:"判断一件事是真是假，最该看什么？", type:"choice", options:["有没有证据和道理","谁的声音更大"], answer:"有没有证据和道理", hint:"看证据，不看嗓门。"},
      {q:"看到一张图说某件事，图一定是真的吗？", type:"choice", options:["不一定，图也可能是假的或拼的","一定是真的"], answer:"不一定，图也可能是假的或拼的", hint:"眼见也不一定为实。"},
      {q:"遇到不懂的事，最好的态度是？", type:"choice", options:["多问'为什么'，把它弄明白","不懂就算了，或者装懂"], answer:"多问'为什么'，把它弄明白", hint:"敢问问题最棒。"},
      {q:"如果证据证明你原来想错了，应该？", type:"choice", options:["承认想错了，改过来","死也不认错"], answer:"承认想错了，改过来", hint:"能改主意是聪明，不是丢人。"},
      {q:"别人夸你或骂你，你就立刻全信吗？", type:"choice", options:["先自己想想是不是真的","别人说啥就是啥"], answer:"先自己想想是不是真的", hint:"别人的话也要过过脑子。"},
      {q:"同学说他家有一只会说话的狗，你会怎么想？", type:"choice", options:["很好奇，但想先看看证据再相信","立刻相信并告诉所有人"], answer:"很好奇，但想先看看证据再相信", hint:"新奇的事更要看证据。"},
      {q:"一条消息没有署名、也说不清楚来源，可信度怎么样？", type:"choice", options:["可信度较低，需要多方查证","肯定是真的"], answer:"可信度较低，需要多方查证", hint:"来源不明的消息要打个问号。"},
      {q:"科学结论主要是靠什么得出来的？", type:"choice", options:["反复的实验和证据","投票的人数"], answer:"反复的实验和证据", hint:"科学看证据，不看人多人少。"},
      {q:"老师讲错了一个知识点，你发现了，应该怎么做？", type:"choice", options:["礼貌地提出来，一起核实","不敢说，只能憋着"], answer:"礼貌地提出来，一起核实", hint:"礼貌提问不等于不尊重。"},

    ]); }},

  /* —— 多线索推理：挑战关，要把好几条线索连起来想 —— */
  advdetect:{ name:"多线索推理", icon:"🧠", cls:"l4", sub:"挑战 · 多条线索一起想",
    tip:"💡 这里的每道题都要用上不止一条线索，最好把线索一条条写下来，再慢慢排除、慢慢算。",
    gen(){
      const NAMES=["小杨","小林","小周","小马","小美","小刚","小丽","小华","小明","小红","乐乐","桃桃","小英","小亮"];
      const t=rnd(1,4);
      if(t===1){ // 和差问题
        const cx=pick([
          {two:["苹果","梨"],unit:"个",verb:"多",lead:"妈妈买了"},
          {two:["笔记本","铅笔"],unit:"元",verb:"贵",lead:"文具店里，"},
          {two:["钢笔","橡皮"],unit:"元",verb:"贵",lead:""},
          {two:["红花","黄花"],unit:"朵",verb:"多",lead:"花园里"},
          {two:["桃桃做对的题","乐乐做对的题"],unit:"道",verb:"多",lead:"",short:true},
        ]);
        const small=rnd(2,8), diff=rnd(1,6), big=small+diff, sum=small+big;
        const askBig=Math.random()<0.5;
        const A=cx.two[0], B=cx.two[1];
        const q=cx.short
          ? A.replace("做对的题","")+"比"+B.replace("做对的题","")+"多做对 "+diff+" "+cx.unit+"，两人一共做对 "+sum+" "+cx.unit+"。<br>"+A.replace("做对的题","")+"做对几"+cx.unit+"？"
          : cx.lead+A+"和"+B+"一共 "+sum+" "+cx.unit+"，"+A+"比"+B+cx.verb+" "+diff+" "+cx.unit+"。<br>"+(askBig?A:B)+"有多少"+cx.unit+"？";
        const ans=cx.short?big:(askBig?big:small);
        return {q, type:"number", answer:ans,
          hint:askBig||cx.short?("较大的数 =（总数＋相差数）÷2 =（"+sum+"＋"+diff+"）÷2 = "+big+"。")
                               :("较小的数 =（总数－相差数）÷2 =（"+sum+"－"+diff+"）÷2 = "+small+"。")};
      }
      if(t===2){ // 比较链4人：谁最高/最矮
        const cmp=pick([{m:"高",l:"矮"},{m:"重",l:"轻"},{m:"大",l:"小"}]);
        const p=sample(NAMES,4), askMost=Math.random()<0.5;
        return {q:p[0]+"比"+p[1]+cmp.m+"，"+p[1]+"比"+p[2]+cmp.m+"，"+p[2]+"比"+p[3]+cmp.m+"。<br>谁最"+(askMost?cmp.m:cmp.l)+"？",
          type:"choice", options:shuffle([p[0],p[1],p[2],p[3]]), answer:askMost?p[0]:p[3],
          hint:p[0]+" > "+p[1]+" > "+p[2]+" > "+p[3]+"（按"+cmp.m+"），"+(askMost?"排头最"+cmp.m:"排尾最"+cmp.l)+"。"};
      }
      if(t===3){ // 连减/连加：三个箱子
        const v3=rnd(8,15), d2=rnd(1,4), d1=rnd(1,4);
        const v2=v3-d2, v1=v2-d1;
        return {q:"三个箱子：1 号比 2 号少 "+d1+" 个，2 号比 3 号少 "+d2+" 个，3 号装了 "+v3+" 个球。<br>1 号装了几个？",
          type:"number", answer:v1,
          hint:"先算 2 号："+v3+"－"+d2+"＝"+v2+"；再算 1 号："+v2+"－"+d1+"＝"+v1+"。"};
      }
      // t===4 年龄链
      const base=rnd(5,9), d1=rnd(1,4), d2=rnd(1,4);
      const p=sample(NAMES,3);
      return {q:p[0]+"比"+p[1]+"大 "+d1+" 岁，"+p[1]+"比"+p[2]+"大 "+d2+" 岁，"+p[2]+"今年 "+base+" 岁。<br>"+p[0]+"今年几岁？",
        type:"number", answer:base+d2+d1,
        hint:"先算"+p[1]+"："+base+"＋"+d2+"＝"+(base+d2)+"；再算"+p[0]+"："+(base+d2)+"＋"+d1+"＝"+(base+d2+d1)+"。"};
    }},
};
